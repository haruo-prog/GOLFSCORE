name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36 platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build free and paid debug APKs
        id: build_apk
        run: |
          set +e
          gradle assembleFreeDebug assemblePaidDebug --stacktrace 2>&1 | tee build-output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Golf-Scorecard-Offline-build-log
          path: build-output.log

      - name: Stop when build failed
        if: steps.build_apk.outputs.exit_code != '0'
        run: exit ${{ steps.build_apk.outputs.exit_code }}

      - name: Prepare release APKs
        run: |
          mkdir -p release
          cp app/build/outputs/apk/free/debug/app-free-debug.apk release/Golf-Scorecard-Offline-Free-v1.19.0-v31-debug.apk
          cp app/build/outputs/apk/paid/debug/app-paid-debug.apk release/Golf-Scorecard-Offline-Pro-v1.19.0-v31-debug.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Golf-Scorecard-Offline-v211-date-overhaul-debug-apks
          path: release/*.apk

      - name: Commit APKs to release folder
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/Golf-Scorecard-Offline-Free-v1.19.0-v31-debug.apk release/Golf-Scorecard-Offline-Pro-v1.19.0-v31-debug.apk
          git diff --cached --quiet && echo "No APK changes to commit" || git commit -m "Add latest V2.11 date overhaul free and pro APKs [skip ci]"
          git push
